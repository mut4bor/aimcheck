services:
  postgres:
    image: postgres:15
    networks:
      - aim-trainer
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - '5437:5432'

  server:
    image: 172.16.0.100:8011/aim-trainer-server
    networks:
      - aim-trainer
    ports:
      - '8062:3000'
    environment:
      - PORT
      - DB_HOST
      - DB_PORT
      - DB_USERNAME
      - DB_PASSWORD
      - DB_DATABASE
      - BETTER_AUTH_SECRET
      - BETTER_AUTH_URL
      - CLIENT_URL
      - NODE_ENV
    depends_on:
      - postgres

  client:
    image: 172.16.0.100:8011/aim-trainer-client
    networks:
      - aim-trainer
    ports:
      - '8061:4173'
    environment:
      VITE_API_URL: ${VITE_API_URL}
    depends_on:
      - server

volumes:
  postgres_data:
networks:
  aim-trainer:
